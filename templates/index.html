<!DOCTYPE html>
<html>
<head>
    <title>Apex MidTech AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .bot { background: #e9e9eb; color: #333; }
        .input-area { padding: 20px; background: white; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; margin-left: 10px; border-radius: 5px; }
        
        /* Typing Dots Animation */
        .dots { display: none; padding: 10px; background: #e9e9eb; width: 40px; border-radius: 10px; margin: 10px 0; }
        .dot { width: 8px; height: 8px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.3s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:#007bff;">Apex MidTech AI</h2>
    <div id="chat-box"></div>
    <div id="typing" class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMsg()">Send</button>
    </div>

    <script>
        async function sendMsg() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const dots = document.getElementById('typing');
            if(!input.value) return;

            box.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userMsg = input.value;
            input.value = '';
            dots.style.display = 'block'; // Show dots
            box.scrollTop = box.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: userMsg})
            });
            const data = await res.json();
            
            dots.style.display = 'none'; // Hide dots
            box.innerHTML += `<div class="msg bot">${data.reply}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
