<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: sans-serif; }
        #chat-window { display: none; width: 380px; height: 550px; flex-direction: column; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-900">

    <div id="chat-widget">
        <button onclick="toggleChat()" class="bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-full shadow-2xl transition-all transform hover:rotate-12">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </button>

        <div id="chat-window" class="glass-effect rounded-3xl shadow-2xl border border-gray-200 overflow-hidden mb-5">
            <div class="bg-blue-600 p-5 text-white flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-lg leading-tight">Mobile City AI</h3>
                    <p class="text-xs text-blue-100">● Always Online</p>
                </div>
                <button onclick="toggleChat()" class="text-2xl hover:text-gray-200">✕</button>
            </div>
            
            <div id="chat-display" class="flex-1 p-5 overflow-y-auto space-y-4 bg-white/50">
                <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%]">
                    Welcome to Mobile City. I can help you find the latest iPhone and Samsung devices. What's on your mind?
                </div>
            </div>

            <div class="p-4 bg-white border-t flex items-center gap-2">
                <input id="user-input" type="text" placeholder="Ask about prices..." 
                       class="flex-1 bg-gray-100 border-none p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="sendMessage()" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const display = document.getElementById('chat-display');
            if(!input.value.trim()) return;

            const userText = input.value;
            display.innerHTML += `<div class="bg-gray-200 text-gray-800 p-4 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] ml-auto text-right">${userText}</div>`;
            input.value = '';
            display.scrollTop = display.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: userText})
                });
                const data = await response.json();
                display.innerHTML += `<div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] animate-fade-in">${data.reply}</div>`;
                display.scrollTop = display.scrollHeight;
            } catch (e) {
                display.innerHTML += `<div class="text-red-500 text-xs italic">Network error. Please try again.</div>`;
            }
        }
    </script>
</body>
</html>
